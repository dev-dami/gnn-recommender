epochs: 200
batch_size: 2048
learning_rate: 0.001
weight_decay: 1.0e-05
neg_samples: 1
gradient_clip: 1.0
early_stopping_patience: 20
lr_scheduler: cosine
lr_min: 1.0e-06
warmup_epochs: 20
eval_every: 5
top_k: [10, 20]
seed: 42
device: auto
log_dir: outputs/logs
checkpoint_dir: outputs/checkpoints
plot_dir: outputs/plots
embedding_dir: outputs/embeddings

# Advanced features
mixed_precision: false
mp_dtype: fp16
distributed: false
gradient_accumulation_steps: 1
ssl_loss_weight: 0.0
ultralgcn_weight: 0.0
edge_dropout: 0.0
node_dropout: 0.0
