epochs: 200
batch_size: 2048
learning_rate: 0.001
weight_decay: 1.0e-05
neg_samples: 1
gradient_clip: 1.0
early_stopping_patience: 20
lr_scheduler: cosine
lr_min: 1.0e-06
warmup_epochs: 20
eval_every: 5
top_k: [10, 20]
seed: 42
device: auto
log_dir: outputs/logs
checkpoint_dir: outputs/checkpoints
plot_dir: outputs/plots
embedding_dir: outputs/embeddings
